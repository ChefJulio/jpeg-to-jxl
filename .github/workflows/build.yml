name: Build WASM

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone libjxl
        run: |
          git clone --depth 1 --recursive https://github.com/libjxl/libjxl.git deps/libjxl

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Verify Emscripten
        run: emcc --version

      - name: Build WASM
        run: bash build/build.sh

      - name: Show output sizes
        run: |
          ls -la dist/
          echo ""
          WASM_RAW=$(wc -c < dist/transcode.wasm)
          WASM_GZ=$(gzip -c dist/transcode.wasm | wc -c)
          JS_RAW=$(wc -c < dist/transcode.js)
          echo "=== Build Size Report ==="
          echo "transcode.wasm: $WASM_RAW bytes ($WASM_GZ gzipped)"
          echo "transcode.js:   $JS_RAW bytes"
          echo "Total payload:  $((WASM_RAW + JS_RAW)) bytes raw"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jpeg-to-jxl-dist
          path: dist/
          retention-days: 30

      - name: Upload demo page
        uses: actions/upload-artifact@v4
        with:
          name: jpeg-to-jxl-demo
          path: |
            examples/
            dist/
          retention-days: 30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create test fixture
        run: |
          pip install Pillow --quiet
          mkdir -p test/fixtures
          python3 -c "
          from PIL import Image
          import random
          # Generate a 512x512 image with realistic noise (not solid color)
          # so JPEG produces a non-trivial file where JXL savings are visible
          random.seed(42)
          img = Image.new('RGB', (512, 512))
          pixels = img.load()
          for y in range(512):
              for x in range(512):
                  r = min(255, max(0, x // 2 + random.randint(-20, 20)))
                  g = min(255, max(0, y // 2 + random.randint(-20, 20)))
                  b = min(255, max(0, (x + y) // 4 + random.randint(-20, 20)))
                  pixels[x, y] = (r, g, b)
          img.save('test/fixtures/sample.jpg', 'JPEG', quality=90)
          import os
          size = os.path.getsize('test/fixtures/sample.jpg')
          print(f'Created 512x512 test JPEG: {size} bytes')
          "

      - name: Run tests
        run: node --test test/round-trip.test.js

      - name: Prepare Pages site
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          mkdir -p _site/dist
          cp examples/index.html _site/
          cp dist/index.js _site/dist/
          cp dist/transcode.js _site/dist/
          cp dist/transcode.wasm _site/dist/

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: jpeg-to-jxl-dist
          path: dist/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN3 }}
