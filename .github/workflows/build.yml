name: Build WASM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone libjxl
        run: |
          git clone --depth 1 --recursive https://github.com/libjxl/libjxl.git deps/libjxl

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Verify Emscripten
        run: emcc --version

      - name: Build WASM
        run: bash build/build.sh

      - name: Show output sizes
        run: |
          ls -la dist/
          echo ""
          echo "WASM size: $(wc -c < dist/transcode.wasm) bytes"
          echo "WASM gzipped: $(gzip -c dist/transcode.wasm | wc -c) bytes"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jpeg-to-jxl-dist
          path: dist/
          retention-days: 30

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create test fixture
        run: |
          python3 -c "
          import struct, zlib
          # Minimal valid JPEG: 2x2 red pixels
          # Using a raw JFIF-encoded JPEG via Python's built-in capabilities
          from io import BytesIO
          # Fallback: write a minimal valid JPEG by hand (SOI + APP0 + DQT + SOF0 + DHT + SOS + EOI)
          # Simpler: use PIL if available, else download a tiny sample
          try:
              from PIL import Image
              img = Image.new('RGB', (64, 64), (255, 0, 0))
              img.save('test/fixtures/sample.jpg', 'JPEG', quality=90)
              print('Created test JPEG via Pillow')
          except ImportError:
              import urllib.request
              # Use a known tiny JPEG from the web
              urllib.request.urlretrieve(
                  'https://www.w3.org/MarkUp/Test/xhtml-print/20050519/tests/jpeg420exif.jpg',
                  'test/fixtures/sample.jpg')
              print('Downloaded test JPEG from W3C')
          "

      - name: Run tests
        run: node --test test/round-trip.test.js
